<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>DaemonERA</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --accent: #2b7cff;
      --accent-hover: #1a6aff;
      --success: #3fb950;
      --error: #f85149;
      --text: #e6edf3;
      --muted: #8b949e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      min-height: 420px;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .header-logo {
      width: 28px; height: 28px; border-radius: 6px;
      background: linear-gradient(135deg, #2b7cff, #6e40c9);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .header-title { font-weight: 700; font-size: 15px; }
    .header-sub { font-size: 11px; color: var(--muted); }

    /* ── Sections ── */
    .section { padding: 20px 16px; flex: 1; display: flex; flex-direction: column; gap: 14px; }

    /* ── Steps indicator ── */
    .steps {
      display: flex; gap: 6px; align-items: center; margin-bottom: 4px;
    }
    .step {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--muted);
    }
    .step-dot {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
    }
    .step.active .step-dot { border-color: var(--accent); color: var(--accent); }
    .step.done .step-dot { background: var(--success); border-color: var(--success); color: #fff; }
    .step-line { flex: 1; height: 1px; background: var(--border); }

    /* ── Form ── */
    label { font-size: 12px; color: var(--muted); font-weight: 600; }
    input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border 0.15s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    /* OTP input — big digits */
    .otp-input {
      font-size: 24px;
      letter-spacing: 8px;
      text-align: center;
      font-weight: 700;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }
    .btn-danger { background: #3d1a1a; color: var(--error); border: 1px solid #5c2020; }
    .btn-danger:hover:not(:disabled) { background: #5c2020; }
    .btn-success { background: #1a3d1a; color: var(--success); border: 1px solid #2a5e2a; }
    .btn-success:hover:not(:disabled) { background: #2a5e2a; }

    /* ── Alerts ── */
    .alert {
      padding: 10px 12px; border-radius: 8px; font-size: 13px;
      display: none;
    }
    .alert.show { display: block; }
    .alert-error { background: #3d1a1a; color: var(--error); border: 1px solid #5c2020; }
    .alert-info  { background: #1a2a3d; color: #79b8ff;   border: 1px solid #1f4068; }
    .alert-success { background: #1a3d1a; color: var(--success); border: 1px solid #2a5e2a; }

    /* ── Info note ── */
    .note {
      font-size: 12px; color: var(--muted);
      padding: 8px 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; line-height: 1.6;
    }
    .note code {
      background: #21262d; padding: 1px 4px; border-radius: 4px;
      font-family: monospace; font-size: 11px; color: #79b8ff;
    }

    /* ── User card ── */
    .user-card {
      display: flex; gap: 12px; align-items: center;
      padding: 12px; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px;
    }
    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      object-fit: cover; background: #21262d;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .user-name { font-weight: 700; font-size: 15px; }
    .user-meta { font-size: 12px; color: var(--muted); }
    .badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      background: var(--accent); color: #fff;
      padding: 1px 6px; border-radius: 999px; margin-left: 6px;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.6s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Page visibility ── */
    .page { display: none; }
    .page.active { display: flex; flex-direction: column; flex: 1; }
  </style>
</head>
<body>

  <!-- Header (always visible) -->
  <div class="header">
    <div class="header-logo">🔐</div>
    <div>
      <div class="header-title">DaemonERA</div>
      <div class="header-sub">Telegram Authentication</div>
    </div>
  </div>

  <!-- PAGE 1: Enter username / ID -->
  <div class="page active" id="page-identify">
    <div class="section">
      <div class="steps">
        <div class="step active" id="s1">
          <div class="step-dot">1</div>
          <span>Identify</span>
        </div>
        <div class="step-line"></div>
        <div class="step" id="s2">
          <div class="step-dot">2</div>
          <span>Verify OTP</span>
        </div>
        <div class="step-line"></div>
        <div class="step" id="s3">
          <div class="step-dot">3</div>
          <span>Done</span>
        </div>
      </div>

      <div>
        <label for="identifier">Telegram Username or ID</label>
        <input
          id="identifier"
          type="text"
          placeholder="@username  or  123456789"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div id="alert-identify" class="alert"></div>

      <button class="btn btn-primary" id="btn-send-otp">
        Send OTP to Telegram
      </button>

      <div class="note">
        ℹ️ You must send <code>/start</code> to
        <code>@Daemon_T_bot</code> in Telegram at least once before logging in.
        Your OTP will be sent there.
      </div>
    </div>
  </div>

  <!-- PAGE 2: Enter OTP -->
  <div class="page" id="page-otp">
    <div class="section">
      <div class="steps">
        <div class="step done">
          <div class="step-dot">✓</div>
          <span>Identify</span>
        </div>
        <div class="step-line"></div>
        <div class="step active">
          <div class="step-dot">2</div>
          <span>Verify OTP</span>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-dot">3</div>
          <span>Done</span>
        </div>
      </div>

      <div id="otp-sent-note" class="alert alert-info show">
        ✅ OTP sent! Check <strong>@Daemon_T_bot</strong> in Telegram and enter the 6-digit code below.
      </div>

      <div>
        <label for="otp">6-Digit OTP</label>
        <input
          id="otp"
          class="otp-input"
          type="text"
          inputmode="numeric"
          maxlength="6"
          placeholder="000000"
          autocomplete="one-time-code"
        />
      </div>

      <div id="alert-otp" class="alert"></div>

      <button class="btn btn-primary" id="btn-verify-otp">
        Verify OTP
      </button>
      <button class="btn btn-ghost" id="btn-back">
        ← Back
      </button>
    </div>
  </div>

  <!-- PAGE 3: Logged in -->
  <div class="page" id="page-loggedin">
    <div class="section">
      <div class="user-card">
        <div id="user-avatar" class="avatar">👤</div>
        <div>
          <div class="user-name" id="user-name">—</div>
          <div class="user-meta" id="user-meta">—</div>
        </div>
      </div>

      <button class="btn btn-success" id="btn-dashboard">
        🖥 Open Dashboard
      </button>
      <button class="btn btn-ghost" id="btn-logout">
        Log out
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
